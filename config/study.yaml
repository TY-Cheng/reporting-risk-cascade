paper:
  title: "From Restatements to Public Review and Correction"
  subtitle: "Label Observability and the Public Reporting-Risk Cascade"

inputs:
  raw_data: "${DATA_DIR}/raw/raw_dataset_misstatement.parquet"
  issuer_origin_panel: "${LAKE_GOLD_DIR}/issuer_origin_panel.parquet"
  public_lake_run_metadata: "${LAKE_SILVER_DIR}/public_lake_run_metadata.json"
  form_ap_source_metadata: "${LAKE_SILVER_DIR}/form_ap_source_metadata.json"
  gvkey_cik_crosswalk: "${DATA_DIR}/linkage/raw_only/gvkey_cik_year.csv"

outputs:
  benchmark_subdir: "benchmark"
  public_cascade_subdir: "public_cascade"
  bridge_probe_subdir: "bridge_probe"
  peer_comparison_subdir: "peer_comparison"
  public_peer_comparison_subdir: "public_peer_comparison"
  construct_overlap_subdir: "construct_overlap"
  opacity_validation_refresh_subdir: "opacity_validation_refresh"

bridge:
  overlap_start_year: 2011
  overlap_end_year: 2019
  require_crosswalk: false

peer_comparison:
  mode: "none"
  target: "both"
  parallel_jobs: 4
  model_threads: 2
  memory_profile: "local_mac_conservative"
  light_timeout_seconds: 90

construct_alignment:
  bootstrap_seed: 42
  bootstrap_reps: 1000
  exploratory_top_n: 5
  public_to_benchmark_primary:
    model_id: "public_cascade"
    task: "8k_402"
    feature_set: "all"
    train_window: "expanding"
    label_mode: "benchmark_naive"
    score_aggregation: "mean"
    bridge_tier: "high_confidence"
  benchmark_to_public_primary:
    model_id: "benchmark_xgb"
    target_public_label: "label_8k_402_365"
    feature_set: "benchmark_all"
    train_window: "expanding"
    label_mode: "naive"
    score_aggregation: "benchmark_score"
    bridge_tier: "high_confidence"

notes:
  estimand: "pre-disclosure public reporting-risk state"
  active_scope: "benchmark + public cascade study workflow only"
