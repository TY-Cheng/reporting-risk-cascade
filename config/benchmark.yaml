columns:
  target: "misstatement firm-year"
  firm_col: "gvkey"
  year_col: "data_year"
  leakage_cols: ["res_an0", "res_an1", "res_an2", "res_an3"]
  external_detection_year_col: "detection_year"
  external_filing_date_col: "res_filing_date"

analysis:
  raw_missing_threshold: 0.30
  unknown_positive_strategy: "drop"
  label_modes: ["naive", "proxy_sensitivity"]
  candidate_train_windows: [null, 5, 7, 10]
  min_train_years: 5
  top_k: [50, 100, 200, 500]
  break_years: [2005, 2010, 2017]
  mixture_k_values: [3, 4, 5]
  dml_treatment_col: "missingness_density_score"
  dml_folds: 5
  recommendation_label_mode: "proxy_sensitivity"
  seed: 42
  xgb:
    n_estimators: 250
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 5.0
    reg_lambda: 1.0
    n_jobs: -1
    tree_method: "hist"
